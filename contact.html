
<!DOCTYPE html>

    <header class="header">

    <main class="contact-main">
        <h2>Contact Us</h2>
        <p>Have questions or want to collaborate? Reach out to us using the form below!</p>

        <form class="contact-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Your message..." required></textarea>

            <button type="submit" class="cta-button">Send Message</button>
        </form>

        
        <div class="contact-info">
            <p>Email: jaysongichuki025@gmail.com</p>
            <p>Phone: +254 701744757</p>
            <p>Follow us on <a href="#">Instagram</a>, <a href="#">Facebook</a>, <a href="#">Twitter</a></p>
        </div>
    </main>

    
    <footer class="footer">
        <p>© 2026 Jmiac. All rights reserved.</p>
    </footer>
